name: Sync GitVerse

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push mirror to GitVerse
        env:
          GITVERSE_TOKEN: ${{ secrets.GITVERSE_TOKEN }}
        run: |
          if [ -z "$GITVERSE_TOKEN" ]; then
            echo "GITVERSE_TOKEN secret is not configured"
            exit 1
          fi
          git remote add gitverse "https://oauth2:${GITVERSE_TOKEN}@gitverse.ru/yasg1988/ru-software-registry-skill.git"
          git push gitverse main
          git push gitverse --tags
